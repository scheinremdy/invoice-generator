<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SmartInvoice Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">

  <!-- PDF LIBRARIES -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div id="invoice">
  <div class="container">

    <header>
      <h1>SmartInvoice Pro</h1>
      <p>Create professional invoices instantly</p>
    </header>

    <!-- DETAILS -->
    <section class="card">
      <h2>Invoice Details</h2>

      <input type="text" id="clientName" placeholder="Client Name">
      <input type="text" id="clientAddress" placeholder="Client Address">

      <div class="row">
        <input type="date" id="invoiceDate">
        <input type="date" id="dueDate">
      </div>

      <div class="row">
        <select id="currency">
          <option value="€">EUR (€)</option>
          <option value="$">USD ($)</option>
          <option value="₱">PHP (₱)</option>
        </select>

        <select id="vat">
          <option value="0">No VAT</option>
          <option value="0.19">VAT 19%</option>
        </select>
      </div>
    </section>

    <!-- ITEMS -->
    <section class="card">
      <h2>Items</h2>
      <div id="itemsContainer"></div>
      <button id="addItem">+ Add Item</button>
    </section>

    <!-- SUMMARY -->
    <section class="card">
      <h2>Summary</h2>

      <div class="summary">
        <p>Subtotal: <span id="subtotal">0.00</span></p>
        <p>VAT: <span id="vatAmount">0.00</span></p>
        <h3>Total: <span id="total">0.00</span></h3>
      </div>

      <button id="downloadPDF">Download PDF</button>
    </section>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
